services:
  neo4j:
    image: neo4j:5.20-community
    container_name: p02_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/Neo4jStrongPass!
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_server_memory_heap_max__size: 2G
    volumes:
      - p02_neo4j_data:/data
      - p02_neo4j_logs:/logs
      - ./cypher:/cypher
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 | grep -q neo4j_version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  p02_neo4j_data:
  p02_neo4j_logs:
